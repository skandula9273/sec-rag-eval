# V0 configuration. Every value here is an ablation knob: change one, rerun
# `make eval`, compare the JSON in eval_results/. The point of the project is
# that these are levers with measured effects, not hardcoded constants.
#
# V0 implements DENSE retrieval only. hybrid/rerank knobs are intentionally
# absent — they arrive in V1/V2 with their own config file (v1.yaml, v2.yaml).

corpus: financebench        # V0: FinanceBench PDFs only. (V1: + edgar, finnhub)

chunking:
  strategy: token           # token | section_then_token (section-aware split first)
  max_tokens: 512
  overlap_tokens: 64
  encoder: cl100k_base      # tiktoken encoding used by text-embedding-3-*

embedding:
  provider: openai
  model: text-embedding-3-small
  dim: 1536                 # must match db/schema.sql vector(1536)
  batch_size: 128

retrieval:
  method: dense             # V0: dense only
  top_k: 5                  # k for recall@5 headline; eval also reports @10
  distance: cosine          # pgvector <=> operator (vector_cosine_ops index)

generation:
  provider: anthropic
  # Exact API model id is confirmed against the Anthropic API, not hardcoded
  # blind. Set via config so eval can swap models without touching code.
  model: claude-haiku-4-5
  max_tokens: 1024
  temperature: 0.0          # deterministic generation for reproducible eval

eval:
  dataset: PatronusAI/financebench
  recall_ks: [5, 10]
  seed: 13                  # any sampling step uses this
  # RAGAS faithfulness is V1+. Off by default in V0 so the critical path is
  # just recall@k. Flip on once recall baseline is committed.
  faithfulness: false
